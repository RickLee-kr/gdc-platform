# Full stack: PostgreSQL + API + static frontend + nginx reverse proxy (single browser entrypoint).
# Production-style bind-mounted TLS and no DB/API host publish: deploy/docker-compose.https.yml
# (see docs/deployment/https-reverse-proxy.md).
#
# Database: bundled `postgres` uses catalog `datarelay` (compose volume `datarelay_postgres_data`).
# Host pytest must use catalog `gdc_pytest` on a dedicated test stack (see tests/db_test_policy.py).
# Host tools / Alembic for the API: align DATABASE_URL in .env with the compose postgres service.
#
# Development validation lab (WireMock, fixtures, external test network) is isolated to
# docker-compose.dev-validation.yml / docker-compose.test.yml — not this file.
# For the full lab: ./scripts/validation-lab/start.sh (docs/testing/dev-validation-lab.md).
#
# Run migrations first: `docker compose -f docker-compose.platform.yml run --rm api alembic upgrade head`
#
# Browser (via nginx): http://localhost:${GDC_ENTRY_HTTP_PORT:-18080}
#   HTTPS (after Admin → HTTPS): https://localhost:${GDC_ENTRY_HTTPS_PORT:-18443}
# Direct API on the host: http://localhost:${GDC_API_HOST_PORT:-8000} (see `api` service `ports` below).
# Production-style host ports: set GDC_ENTRY_HTTP_PORT=80 GDC_ENTRY_HTTPS_PORT=443 GDC_PUBLIC_HTTPS_PORT=443.

services:
  postgres:
    image: postgres:16-alpine
    container_name: gdc-platform-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datarelay}
      POSTGRES_USER: ${POSTGRES_USER:-datarelay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong-db-password}
    volumes:
      - datarelay_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datarelay} -d ${POSTGRES_DB:-datarelay}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "55432:5432"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: gdc-platform-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-datarelay}:${POSTGRES_PASSWORD:-change-me-strong-db-password}@postgres:5432/${POSTGRES_DB:-datarelay}
      APP_ENV: ${APP_ENV:-production}
      ENABLE_DEV_VALIDATION_LAB: ${ENABLE_DEV_VALIDATION_LAB:-false}
      DEV_VALIDATION_AUTO_START: ${DEV_VALIDATION_AUTO_START:-false}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-true}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      GDC_TRUST_PROXY_HEADERS: "true"
      GDC_PROXY_FORWARD_TRUSTED_HOSTS: "*"
      GDC_TLS_CERT_PATH: /var/gdc/tls/server.crt
      GDC_TLS_KEY_PATH: /var/gdc/tls/server.key
      GDC_NGINX_TLS_CERT_CONTAINER_PATH: /var/gdc/tls/server.crt
      GDC_NGINX_TLS_KEY_CONTAINER_PATH: /var/gdc/tls/server.key
      GDC_NGINX_CONF_PATH: /var/gdc/nginx/default.conf
      GDC_UPSTREAM_API_HOST: api
      GDC_UPSTREAM_API_PORT: "8000"
      GDC_UPSTREAM_UI_HOST: frontend
      GDC_UPSTREAM_UI_PORT: "80"
      GDC_PROXY_RELOAD_URL: http://reverse-proxy:8099/__gdc_internal/reload
      GDC_PROXY_RELOAD_TOKEN: ${GDC_PROXY_RELOAD_TOKEN:-devtoken}
      GDC_PROXY_INTERNAL_HEALTH_URL: http://reverse-proxy/health
      GDC_PUBLIC_HTTPS_PORT: ${GDC_PUBLIC_HTTPS_PORT:-18443}
    volumes:
      - gdc_platform_tls:/var/gdc/tls
      - gdc_platform_nginx:/var/gdc/nginx
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${GDC_API_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: gdc-platform-frontend
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  reverse-proxy:
    build:
      context: ./docker/reverse-proxy
      dockerfile: Dockerfile
    container_name: gdc-platform-reverse-proxy
    environment:
      GDC_PROXY_RELOAD_TOKEN: ${GDC_PROXY_RELOAD_TOKEN:-devtoken}
      GDC_UPSTREAM_API_HOST: api
      GDC_UPSTREAM_API_PORT: "8000"
      GDC_UPSTREAM_UI_HOST: frontend
      GDC_UPSTREAM_UI_PORT: "80"
    ports:
      - "${GDC_ENTRY_HTTP_PORT:-18080}:80"
      - "${GDC_ENTRY_HTTPS_PORT:-18443}:443"
    volumes:
      - gdc_platform_tls:/var/gdc/tls:ro
      - gdc_platform_nginx:/etc/nginx/conf.d
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

volumes:
  datarelay_postgres_data:
  gdc_platform_tls:
  gdc_platform_nginx:
