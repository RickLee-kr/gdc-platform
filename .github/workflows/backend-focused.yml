name: Backend focused tests

on:
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "alembic/**"
      - "pytest.ini"
      - "docker-compose*.yml"
      - "scripts/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gdc
          POSTGRES_PASSWORD: gdc
          POSTGRES_DB: gdc_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U gdc -d gdc_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ensure pytest catalog (gdc_pytest)
        env:
          TEST_DATABASE_URL: postgresql://gdc:gdc@127.0.0.1:55432/gdc_pytest
        run: python3 scripts/test/ensure_gdc_pytest_catalog.py
      - name: Run pytest (exclude WireMock integration)
        env:
          TEST_DATABASE_URL: postgresql://gdc:gdc@127.0.0.1:55432/gdc_pytest
        run: python3 -m pytest -m "not wiremock_integration" --tb=short -q
