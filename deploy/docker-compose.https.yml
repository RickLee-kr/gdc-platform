# Production-style HTTPS stack (nginx TLS termination, same image as docker-compose.platform.yml).
#
# Compared to docker-compose.platform.yml:
#   - PostgreSQL is NOT published on the host (internal network only).
#   - API port 8000 is NOT published on the host; use the reverse proxy only.
#   - TLS PEM files are bind-mounted from deploy/tls (operator-generated; never commit keys).
#
# Run from the repository root (so paths and optional root .env resolve predictably):
#   docker compose -f deploy/docker-compose.https.yml config -q
#   docker compose -f deploy/docker-compose.https.yml --env-file .env up -d --build
#
# Firewall / NAT:
#   - Open only the published reverse-proxy ports (GDC_ENTRY_HTTP_PORT / GDC_ENTRY_HTTPS_PORT).
#   - Bind to a private interface if needed, e.g. GDC_ENTRY_HTTP_PORT=10.0.0.5:80:80
#   - Keep PostgreSQL off the public internet; this file does not map DB ports to the host.
#
# Rollback: stop this stack and use docker-compose.yml (DB-only dev) or docker-compose.platform.yml
# for local HTTP entry (platform defaults :18080→80); see docs/deployment/https-reverse-proxy.md.
#
# Published ports (defaults are production-oriented):
#   GDC_ENTRY_HTTP_PORT  host → container 80   (default 80)
#   GDC_ENTRY_HTTPS_PORT host → container 443 (default 443)
# Local/lab without binding 80/443 on the host:
#   export GDC_ENTRY_HTTP_PORT=18080 GDC_ENTRY_HTTPS_PORT=18443 GDC_PUBLIC_HTTPS_PORT=18443

name: gdc-platform-https

services:
  postgres:
    image: postgres:16-alpine
    container_name: gdc-platform-https-postgres
    environment:
      POSTGRES_DB: gdc
      POSTGRES_USER: gdc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdc}
    volumes:
      - gdc_https_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gdc -d gdc"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: gdc-platform-https-api
    environment:
      DATABASE_URL: postgresql://gdc:${POSTGRES_PASSWORD:-gdc}@postgres:5432/gdc
      ENABLE_DEV_VALIDATION_LAB: "false"
      REQUIRE_AUTH: ${REQUIRE_AUTH:-true}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      GDC_TRUST_PROXY_HEADERS: "true"
      GDC_PROXY_FORWARD_TRUSTED_HOSTS: "*"
      GDC_TLS_CERT_PATH: /var/gdc/tls/server.crt
      GDC_TLS_KEY_PATH: /var/gdc/tls/server.key
      GDC_NGINX_TLS_CERT_CONTAINER_PATH: /var/gdc/tls/server.crt
      GDC_NGINX_TLS_KEY_CONTAINER_PATH: /var/gdc/tls/server.key
      GDC_NGINX_CONF_PATH: /var/gdc/nginx/default.conf
      GDC_UPSTREAM_API_HOST: api
      GDC_UPSTREAM_API_PORT: "8000"
      GDC_UPSTREAM_UI_HOST: frontend
      GDC_UPSTREAM_UI_PORT: "80"
      GDC_PROXY_RELOAD_URL: http://reverse-proxy:8099/__gdc_internal/reload
      GDC_PROXY_RELOAD_TOKEN: ${GDC_PROXY_RELOAD_TOKEN:-devtoken}
      GDC_PROXY_INTERNAL_HEALTH_URL: http://reverse-proxy/health
      GDC_PUBLIC_HTTPS_PORT: ${GDC_PUBLIC_HTTPS_PORT:-443}
    volumes:
      - ./tls:/var/gdc/tls
      - gdc_https_nginx:/var/gdc/nginx
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: gdc-platform-https-frontend
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  reverse-proxy:
    build:
      context: ../docker/reverse-proxy
      dockerfile: Dockerfile
    container_name: gdc-platform-https-reverse-proxy
    environment:
      GDC_PROXY_RELOAD_TOKEN: ${GDC_PROXY_RELOAD_TOKEN:-devtoken}
      GDC_UPSTREAM_API_HOST: api
      GDC_UPSTREAM_API_PORT: "8000"
      GDC_UPSTREAM_UI_HOST: frontend
      GDC_UPSTREAM_UI_PORT: "80"
    ports:
      - "${GDC_ENTRY_HTTP_PORT:-80}:80"
      - "${GDC_ENTRY_HTTPS_PORT:-443}:443"
    volumes:
      - ./tls:/var/gdc/tls:ro
      - gdc_https_nginx:/etc/nginx/conf.d
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

volumes:
  gdc_https_pg:
  gdc_https_nginx:
