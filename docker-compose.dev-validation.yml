# Development validation lab — merges the isolated test stack (see specs/018).
# Standalone lab (includes postgres-test on host 55432):
#   docker compose -p gdc-platform-test -f docker-compose.dev-validation.yml --profile dev-validation up -d
#
# Platform + fixtures (catalog DB is platform postgres — no postgres-test on 55432):
#   ./scripts/dev-validation/bootstrap-platform-dev-validation.sh
#   (-p avoids merging with the default docker-compose.yml project in this directory.)
#
# Point the API at the test database and enable the lab (example):
#   export DATABASE_URL=postgresql://gdc:gdc@127.0.0.1:55432/datarelay
#   export ENABLE_DEV_VALIDATION_LAB=true
#   export DEV_VALIDATION_AUTO_START=true
#   export DEV_VALIDATION_WIREMOCK_BASE_URL=http://127.0.0.1:28080
#   export DEV_VALIDATION_WEBHOOK_BASE_URL=http://127.0.0.1:18091
#   export DEV_VALIDATION_SYSLOG_HOST=127.0.0.1
#   export DEV_VALIDATION_SYSLOG_PORT=15514
#
# Operator guide: docs/testing/dev-validation-lab.md

include:
  - path: docker-compose.test.yml
