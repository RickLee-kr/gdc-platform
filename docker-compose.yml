services:
  postgres:
    image: postgres:16-alpine
    container_name: gdc-postgres
    environment:
      POSTGRES_DB: gdc
      POSTGRES_USER: gdc
      POSTGRES_PASSWORD: gdc
    ports:
      - "5432:5432"
    volumes:
      - gdc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gdc -d gdc"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  gdc_postgres_data:
