[pytest]
pythonpath = .
testpaths = tests
norecursedirs = tools/spec-kit
markers =
    wiremock_integration: HTTP integration tests against Docker WireMock (docker compose --profile test up wiremock)
    e2e_smoke: Minimal WireMock E2E for quick post-change verification (subset of regression)
    e2e_auth: WireMock E2E covering connector authentication paths
    e2e_delivery: WireMock E2E covering source fetch through destination delivery
    e2e_checkpoint: WireMock E2E covering checkpoint semantics
    e2e_retry: WireMock E2E covering destination retry behavior
    e2e_regression: Full WireMock-backed E2E regression bucket (compose with other e2e_* markers)
    minio: Optional tests against local MinIO (MINIO_ACCESS_KEY / MINIO_SECRET_KEY)
    source_e2e: Non-HTTP source adapter E2E (MinIO, fixture PostgreSQL, SFTP; see docs/testing/source-adapter-e2e.md)
